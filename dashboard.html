<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBvygu_W0iElJ5zxcxDB5iuMjvtm_8npzM",
    authDomain: "apploja-4c66b.firebaseapp.com",
    projectId: "apploja-4c66b",
    storageBucket: "apploja-4c66b.firebasestorage.app",
    messagingSenderId: "653270948917",
    appId: "1:653270948917:web:8f8ce648377dbff19f657c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const ADMIN_UID = "J4kDE5WmWETA52bpK2EnDj6LhLw2";

  let lojasCache = [];
  let filtroAtual = "todas";

  auth.onAuthStateChanged((user) => {
    if (!user || user.uid !== ADMIN_UID) {
      window.location.href = "login.html";
      return;
    }
    carregarLojas();
  });

  function sair() {
    auth.signOut()
      .then(() => window.location.href = "login.html")
      .catch(err => console.error("Erro ao sair:", err));
  }

  function carregarLojas() {
    db.collection("lojas").onSnapshot((snapshot) => {
      lojasCache = [];
      snapshot.forEach((doc) => {
        lojasCache.push({ id: doc.id, ...doc.data() });
      });
      
      atualizarCardsGlobais();
      renderizarTabela();
    }, (error) => {
      console.error("Erro no Firestore:", error);
    });
  }

  function diasDesde(timestamp) {
    if (!timestamp) return 999;
    const data = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const diffMs = Date.now() - data.getTime();
    return Math.floor(diffMs / (1000 * 60 * 60 * 24));
  }

  function calcularStatus(loja) {
    if (loja.ativo === false) return "bloqueada";
    const dias = diasDesde(loja.dataCadastro);
    if (dias < 30) return "teste";
    return "ativa";
  }

  function formatarData(timestamp) {
    if (!timestamp) return "-";
    const data = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return data.toLocaleDateString("pt-BR");
  }

  function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function filtrar(tipo) {
    filtroAtual = tipo;
    document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("ativo"));
    const botaoAtivo = document.querySelector(`[data-filtro="${tipo}"]`);
    if (botaoAtivo) botaoAtivo.classList.add("ativo");
    renderizarTabela();
  }

  function atualizarCardsGlobais() {
    let totalTeste = 0, totalAtivas = 0, totalBloqueadas = 0, totalReceber = 0;

    lojasCache.forEach((loja) => {
      const status = calcularStatus(loja);
      if (status === "teste") totalTeste++;
      if (status === "ativa") totalAtivas++;
      if (status === "bloqueada") totalBloqueadas++;

      const pedidos = loja.totalPedidosSemana || 0;
      const valorDevido = pedidos * 1.0; 
      if (status !== "teste" && !loja.pagoEstaSemana) {
        totalReceber += valorDevido;
      }
    });

    document.getElementById("totalLojas").textContent = lojasCache.length;
    document.getElementById("totalTeste").textContent = totalTeste;
    document.getElementById("totalAtivas").textContent = totalAtivas;
    document.getElementById("totalBloqueadas").textContent = totalBloqueadas;
    document.getElementById("totalReceber").textContent = formatarMoeda(totalReceber);
  }

  function renderizarTabela() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("tabelaLojas").style.display = "table";

    const corpo = document.getElementById("corpoTabela");
    corpo.innerHTML = "";

    const lojasFiltradas = lojasCache.filter(loja => {
      if (filtroAtual === "todas") return true;
      return calcularStatus(loja) === filtroAtual;
    });

    if (lojasFiltradas.length === 0) {
      corpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#777;">Nenhuma loja encontrada.</td></tr>`;
      return;
    }

    const fragmento = document.createDocumentFragment();

    lojasFiltradas.forEach((loja) => {
      const status = calcularStatus(loja);
      const pedidos = loja.totalPedidosSemana || 0;
      const valorDevido = pedidos * 1.0;
      const statusLabel = { teste: "Em teste", ativa: "Ativa", bloqueada: "Bloqueada" }[status];

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${loja.nome || "(sem nome)"}</strong></td>
        <td><span class="status ${status}">${statusLabel}</span></td>
        <td>${pedidos}</td>
        <td>${formatarMoeda(valorDevido)}</td>
        <td>
          <span style="color: ${loja.pagoEstaSemana ? '#2E7D32' : '#C62828'}; font-weight: bold;">
            ${loja.pagoEstaSemana ? "Sim" : "Não"}
          </span>
        </td>
        <td>${formatarData(loja.dataCadastro)}</td>
        <td class="acoes">
          ${!loja.pagoEstaSemana 
            ? `<button class="btn-pagar" id="btn-pagar-${loja.id}" onclick="marcarPago('${loja.id}')">Marcar Pago</button>` 
            : `<button class="btn-pagar" style="background:#ccc; cursor:not-allowed;" disabled>Pago</button>`
          }
          ${loja.ativo === false
            ? `<button class="btn-desbloquear" id="btn-status-${loja.id}" onclick="alterarAtivo('${loja.id}', true)">Desbloquear</button>`
            : `<button class="btn-bloquear" id="btn-status-${loja.id}" onclick="alterarAtivo('${loja.id}', false)">Bloquear</button>`
          }
        </td>
      `;
      fragmento.appendChild(tr);
    });

    corpo.appendChild(fragmento);
  }

  function marcarPago(lojaId) {
    if (!confirm("Confirmar que o pagamento desta loja foi recebido?")) return;
    
    const botao = document.getElementById(`btn-pagar-${lojaId}`);
    if (botao) {
      botao.disabled = true;
      botao.textContent = "Processando...";
    }

    db.collection("lojas").doc(lojaId).update({
      pagoEstaSemana: true,
      totalPedidosSemana: 0,
      ativo: true
    }).catch(err => {
      console.error("Erro ao pagar:", err);
      alert("Erro ao salvar dados.");
      renderizarTabela();
    });
  }

  function alterarAtivo(lojaId, novoStatus) {
    const acao = novoStatus ? "desbloquear" : "bloquear";
    if (!confirm(`Confirmar que deseja ${acao} esta loja?`)) return;
    
    const botao = document.getElementById(`btn-status-${lojaId}`);
    if (botao) {
      botao.disabled = true;
      botao.textContent = "Processando...";
    }

    db.collection("lojas").doc(lojaId).update({ ativo: novoStatus })
    .catch(err => {
      console.error("Erro ao alterar atividade:", err);
      alert("Erro ao alterar status.");
      renderizarTabela();
    });
  }
</script>
