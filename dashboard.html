<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Lojas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body { background: #f5f7fa; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  h1 { font-size: 20px; color: #222; }
  #btnSair { background: #eee; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }

  .sistemas { display: flex; gap: 8px; margin-bottom: 16px; }
  .sistemas button { padding: 10px 18px; border: 2px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .sistemas button.ativo { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .card .valor { font-size: 24px; font-weight: bold; color: #222; }
  .card .label { font-size: 12px; color: #777; margin-top: 4px; }

  .filtros { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filtros button { padding: 8px 14px; border: 1px solid #ddd; background: #fff; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .filtros button.ativo { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  th, td { padding: 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #eee; }
  th { background: #fafafa; color: #555; font-size: 12px; text-transform: uppercase; }

  .badge-sistema { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #EDE7F6; color: #4527A0; }

  .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: inline-block; }
  .status.teste { background: #FFF3E0; color: #E65100; }
  .status.ativa { background: #E8F5E9; color: #2E7D32; }
  .status.bloqueada { background: #FFEBEE; color: #C62828; }

  .acoes button { padding: 6px 10px; margin-right: 4px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .btn-pagar { background: #2E7D32; color: #fff; }
  .btn-bloquear { background: #C62828; color: #fff; }
  .btn-desbloquear { background: #1976D2; color: #fff; }

  #loading { text-align: center; padding: 40px; color: #777; }
</style>
</head>
<body>

<header>
  <h1>Painel Administrativo — Lojas</h1>
  <button id="btnSair" onclick="sair()">Sair</button>
</header>

<div class="sistemas">
  <button class="ativo" data-sistema="todos" onclick="selecionarSistema('todos')">Todos os apps</button>
  <button data-sistema="gas" onclick="selecionarSistema('gas')">🔥 Gás</button>
  <button data-sistema="bv_delivery" onclick="selecionarSistema('bv_delivery')">🛵 BV Delivery</button>
</div>

<div class="cards">
  <div class="card"><div class="valor" id="totalLojas">-</div><div class="label">Total de lojas</div></div>
  <div class="card"><div class="valor" id="totalTeste">-</div><div class="label">Em período de teste</div></div>
  <div class="card"><div class="valor" id="totalAtivas">-</div><div class="label">Ativas e em dia</div></div>
  <div class="card"><div class="valor" id="totalBloqueadas">-</div><div class="label">Bloqueadas</div></div>
  <div class="card"><div class="valor" id="totalReceber">-</div><div class="label">A receber esta semana</div></div>
</div>

<div class="filtros">
  <button class="ativo" data-filtro="todas" onclick="filtrar('todas')">Todas</button>
  <button data-filtro="teste" onclick="filtrar('teste')">Em teste</button>
  <button data-filtro="ativa" onclick="filtrar('ativa')">Ativas</button>
  <button data-filtro="bloqueada" onclick="filtrar('bloqueada')">Bloqueadas</button>
</div>

<div id="loading">Carregando lojas...</div>

<table id="tabelaLojas" style="display:none;">
  <thead>
    <tr>
      <th>Loja</th>
      <th id="thSistema" style="display:none;">Sistema</th>
      <th>Status</th>
      <th>Pedidos / Semana</th>
      <th>Valor devido</th>
      <th>Pago?</th>
      <th>Cadastro</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="corpoTabela"></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBvygu_W0iElJ5zxcxDB5iuMjvtm_8npzM",
    authDomain: "apploja-4c66b.firebaseapp.com",
    projectId: "apploja-4c66b",
    storageBucket: "apploja-4c66b.firebasestorage.app",
    messagingSenderId: "653270948917",
    appId: "1:653270948917:web:8f8ce648377dbff19f657c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const ADMIN_UID = "J4kDE5WmWETA52bpK2EnDj6LhLw2";

  const nomesSistemas = {
    gas: "🔥 Gás",
    bv_delivery: "🛵 BV Delivery"
  };

  let lojasCache = [];
  let filtroAtual = "todas";
  let sistemaAtual = "todos";

  auth.onAuthStateChanged((user) => {
    if (!user || user.uid !== ADMIN_UID) {
      window.location.href = "login.html";
      return;
    }
    carregarLojas();
  });

  function sair() {
    auth.signOut().then(() => window.location.href = "login.html");
  }

  function carregarLojas() {
    db.collection("lojas").onSnapshot((snapshot) => {
      lojasCache = [];
      snapshot.forEach((doc) => {
        lojasCache.push({ id: doc.id, ...doc.data() });
      });
      renderizar();
    });
  }

  function diasDesde(timestamp) {
    if (!timestamp) return 999;
    const data = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const diffMs = Date.now() - data.getTime();
    return Math.floor(diffMs / (1000 * 60 * 60 * 24));
  }

  function calcularStatus(loja) {
    const dias = diasDesde(loja.dataCadastro);
    if (dias < 30) return "teste";
    if (loja.ativo === false) return "bloqueada";
    return "ativa";
  }

  function formatarData(timestamp) {
    if (!timestamp) return "-";
    const data = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return data.toLocaleDateString("pt-BR");
  }

  function selecionarSistema(sistema) {
    sistemaAtual = sistema;
    document.querySelectorAll(".sistemas button").forEach(b => b.classList.remove("ativo"));
    document.querySelector(`[data-sistema="${sistema}"]`).classList.add("ativo");

    document.getElementById("thSistema").style.display = sistema === "todos" ? "" : "none";

    renderizar();
  }

  function filtrar(tipo) {
    filtroAtual = tipo;
    document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("ativo"));
    document.querySelector(`[data-filtro="${tipo}"]`).classList.add("ativo");
    renderizar();
  }

  function renderizar() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("tabelaLojas").style.display = "table";

    let totalTeste = 0, totalAtivas = 0, totalBloqueadas = 0, totalReceber = 0, totalGeral = 0;
    const corpo = document.getElementById("corpoTabela");
    corpo.innerHTML = "";

    lojasCache.forEach((loja) => {
      // Filtro por sistema (loja sem campo "sistema" é tratada como legado, não aparece em filtros específicos)
      if (sistemaAtual !== "todos" && loja.sistema !== sistemaAtual) return;

      const status = calcularStatus(loja);
      totalGeral++;
      if (status === "teste") totalTeste++;
      if (status === "ativa") totalAtivas++;
      if (status === "bloqueada") totalBloqueadas++;

      const pedidos = loja.totalPedidosSemana || 0;
      const valorDevido = pedidos * 1.0;
      if (status !== "teste" && !loja.pagoEstaSemana) totalReceber += valorDevido;

      if (filtroAtual !== "todas" && filtroAtual !== status) return;

      const statusLabel = { teste: "Em teste", ativa: "Ativa", bloqueada: "Bloqueada" }[status];
      const sistemaLabel = nomesSistemas[loja.sistema] || (loja.sistema || "—");

      const colunaSistema = sistemaAtual === "todos"
        ? `<td><span class="badge-sistema">${sistemaLabel}</span></td>`
        : "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${loja.nome || "(sem nome)"}</td>
        ${colunaSistema}
        <td><span class="status ${status}">${statusLabel}</span></td>
        <td>${pedidos}</td>
        <td>R$ ${valorDevido.toFixed(2)}</td>
        <td>${loja.pagoEstaSemana ? "Sim" : "Não"}</td>
        <td>${formatarData(loja.dataCadastro)}</td>
        <td class="acoes">
          <button class="btn-pagar" onclick="marcarPago('${loja.id}')">Marcar Pago</button>
          ${loja.ativo === false
            ? `<button class="btn-desbloquear" onclick="alterarAtivo('${loja.id}', true)">Desbloquear</button>`
            : `<button class="btn-bloquear" onclick="alterarAtivo('${loja.id}', false)">Bloquear</button>`
          }
        </td>
      `;
      corpo.appendChild(tr);
    });

    document.getElementById("totalLojas").textContent = totalGeral;
    document.getElementById("totalTeste").textContent = totalTeste;
    document.getElementById("totalAtivas").textContent = totalAtivas;
    document.getElementById("totalBloqueadas").textContent = totalBloqueadas;
    document.getElementById("totalReceber").textContent = "R$ " + totalReceber.toFixed(2);
  }

  function marcarPago(lojaId) {
    if (!confirm("Confirmar que o pagamento desta loja foi recebido?")) return;
    db.collection("lojas").doc(lojaId).update({
      pagoEstaSemana: true,
      totalPedidosSemana: 0,
      ativo: true
    });
  }

  function alterarAtivo(lojaId, novoStatus) {
    const acao = novoStatus ? "desbloquear" : "bloquear";
    if (!confirm(`Confirmar que deseja ${acao} esta loja?`)) return;
    db.collection("lojas").doc(lojaId).update({ ativo: novoStatus });
  }
</script>
</body>
</html>
